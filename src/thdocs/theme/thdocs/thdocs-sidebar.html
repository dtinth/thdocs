<div class="thdocs-sidebar">
  <nav class="thdocs-tabs" role="tablist">
    <button type="button" role="tab" data-tab="contents" aria-selected="true">Contents</button>
    <button type="button" role="tab" data-tab="index" aria-selected="false">Index</button>
    <button type="button" role="tab" data-tab="search" aria-selected="false">Search</button>
  </nav>
  <div class="thdocs-tab-panel" data-panel="contents" role="tabpanel">
    <thdocs-tree id="toctree-root">
      {# Server-rendered fallback for no-JS / pre-hydration; hidden by CSS once hydrated #}
      <div class="thdocs-fallback-tree">{{ toctree() }}</div>
    </thdocs-tree>
    {%- if pdf_url %}
    <a href="{{ pathto('_static/' + pdf_url, 1) }}" class="thdocs-pdf-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
      Download PDF
    </a>
    {%- endif %}
  </div>
  <div class="thdocs-tab-panel" data-panel="index" role="tabpanel" hidden>
    <div class="thdocs-index-content"></div>
  </div>
  <div class="thdocs-tab-panel" data-panel="search" role="tabpanel" hidden>
    <div class="thdocs-search">
      <input type="text" id="thdocs-search-input" class="thdocs-search__input" placeholder="Search..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div id="search-results" class="thdocs-search__results"></div>
    </div>
  </div>
</div>
