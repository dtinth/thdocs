{%- extends "basic/layout.html" %}
{%- block extrahead -%}
  {{ super() }}
  <meta name="generator" content="thdocs">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/comic-mono@0.0.1/index.css">
{%- endblock %}
{%- block header %}
<header class="thdocs-header">
  <button type="button" class="thdocs-header-menu-btn" aria-label="Toggle navigation" aria-expanded="false">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6" />
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>
  <a href="{{ pathto(root_doc)|e }}" class="thdocs-header-logo">
    {{ shorttitle|e }}
  </a>
</header>
{%- endblock %}
{%- block relbar1 %}{% endblock %}
{%- block relbar2 %}{% endblock %}
{%- block document -%}
  {{ super() }}
  <aside class="thdocs-page-toc">
    <div class="thdocs-page-toc-title">On this page</div>
    {{ toc }}
  </aside>
{%- endblock %}
