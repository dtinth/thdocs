name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install apt dependencies for PDF
        run: sudo apt-get update -qq && sudo apt-get install -y -qq texlive-xetex latexmk

      - name: Install Python dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/test_build.py -v

      - name: Verify theme assets are in sync
        working-directory: theme-src
        run: |
          pnpm install
          pnpm build
          cd ..
          git diff --exit-code src/thdocs/static/

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install Python dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Run browser tests
        run: uv run pytest tests/test_browser.py -v

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install apt dependencies for PDF
        run: sudo apt-get update -qq && sudo apt-get install -y -qq texlive-xetex latexmk

      - name: Install Python dependencies
        run: uv sync

      - name: Build HTML and PDF
        run: just build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html
          name: github-pages

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
