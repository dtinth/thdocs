name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/dtinth/thdocs:latest
            ghcr.io/dtinth/thdocs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            THDOCS_REF=${{ github.sha }}

  self-publish:
    needs: publish-image
    if: always() && needs.publish-image.result == 'success'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
