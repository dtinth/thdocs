name: Publish

on:
  workflow_call:
    inputs:
      deploy:
        description: Deploy the built docs artifact via deployer-docs
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build HTML and PDF
        uses: ./.github/actions/build-docs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: _build/html
          name: docs
          overwrite: true

      - name: Deploy
        if: inputs.deploy
        uses: dtinth/deployer-docs@main
        with:
          artifact-name: docs
